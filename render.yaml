# ============================================================
# render.yaml — Infrastructure as Code para o Render.com
#
# Quando o repo for conectado pela tela "New > Blueprint" do Render,
# este arquivo é lido automaticamente e o serviço é provisionado
# já com a configuração correta. Nada para preencher na UI.
# ============================================================

services:
  - type: web
    name: mindflow
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .

    # Health check usado pelo Render para saber quando o app subiu.
    # /api/stats é um endpoint barato, sem auth, retorna JSON.
    healthCheckPath: /api/stats

    # Auto-deploy a cada push em main
    autoDeploy: true

    envVars:
      # Usa o perfil dev (H2 em memória + DataSeeder com exemplos).
      # Isso é proposital para a demo acadêmica: cada cold start
      # repopula os dados de exemplo, mantendo o estado limpo.
      - key: SPRING_PROFILES_ACTIVE
        value: dev

      # Locale para mensagens e formatação de data
      - key: LANG
        value: pt_BR.UTF-8
