# ============================================================
# render.yaml — Infrastructure as Code para o Render.com
#
# Quando o repo for conectado pela tela "New > Blueprint" do Render,
# este arquivo é lido automaticamente e o serviço é provisionado
# já com a configuração correta. Nada para preencher na UI.
# ============================================================

services:
  - type: web
    name: mindflow
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .

    # Health check usado pelo Render para saber quando o app subiu.
    # /api/health é público (sem auth) e retorna JSON.
    healthCheckPath: /api/health

    # Auto-deploy a cada push em main
    autoDeploy: true

    envVars:
      # Usa o perfil dev (H2 em memória + DataSeeder com usuário demo).
      # A cada cold start o usuário demo@mindflow.com é recriado com
      # os dados de exemplo, mantendo a demo sempre limpa e funcional.
      - key: SPRING_PROFILES_ACTIVE
        value: dev

      # JWT secret — gerado aleatoriamente pelo Render no primeiro deploy
      # e mantido constante entre redeploys (não muda quando redeploya).
      - key: JWT_SECRET
        generateValue: true

      # Locale para mensagens e formatação de data
      - key: LANG
        value: pt_BR.UTF-8
