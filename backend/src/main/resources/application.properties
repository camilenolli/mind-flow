spring.application.name=mindflow
# Em Render/Heroku/etc o host injeta a porta via env PORT.
# Localmente cai no fallback 8080.
server.port=${PORT:8080}

# Perfil padr\u00e3o: dev (H2 em mem\u00f3ria). Use --spring.profiles.active=prod para PostgreSQL.
spring.profiles.active=dev

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
