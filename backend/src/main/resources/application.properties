spring.application.name=mindflow
# Em Render/Heroku/etc o host injeta a porta via env PORT.
# Localmente cai no fallback 8080.
server.port=${PORT:8080}

# === Otimizações para o free tier (0.1 CPU, 512MB RAM) ===
# Lazy initialization: Spring inicia beans on-demand em vez de no startup.
# Reduz o tempo de boot em ~50%, custo: a primeira request a cada controller
# leva +50-200ms. Aceitável para uma demo acadêmica.
spring.main.lazy-initialization=true

# Hikari pool enxuto: começamos com 1 conexão, máximo 3.
# Reduz overhead inicial e consumo de memória.
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.connection-timeout=20000

# JPA: desabilitar formatação de SQL e estatísticas (não precisamos em prod)
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false

# Perfil padr\u00e3o: dev (H2 em mem\u00f3ria). Use --spring.profiles.active=prod para PostgreSQL.
spring.profiles.active=dev

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# JWT — em prod, sobrescrever via env var JWT_SECRET (render.yaml).
# Esse default é só pra dev. Precisa de >= 32 bytes (256 bits) para HS256.
mindflow.jwt.secret=${JWT_SECRET:dev-only-secret-please-override-in-production-with-32+chars}
mindflow.jwt.expiration-ms=86400000
