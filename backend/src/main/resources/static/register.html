<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07080d" />
  <title>MindFlow — Criar conta</title>
  <script>(function(){var t=localStorage.getItem("mindflow.theme")||"dark";document.documentElement.dataset.theme=t;})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  <main class="auth-shell">
    <div class="auth-card panel">
      <div class="auth-brand">
        <div class="brand-mark" id="auth-mark"></div>
        <div>
          <h1 class="auth-title">MindFlow</h1>
          <p class="auth-subtitle">Crie sua conta</p>
        </div>
      </div>

      <form id="register-form">
        <div class="field">
          <span>Nome</span>
          <input type="text" id="name" required minlength="2" maxlength="120" autocomplete="name" placeholder="Como você quer ser chamada(o)" />
        </div>
        <div class="field">
          <span>Email</span>
          <input type="email" id="email" required autocomplete="email" placeholder="seu@email.com" />
        </div>
        <div class="field">
          <span>Senha (mín. 6 caracteres)</span>
          <input type="password" id="password" required minlength="6" maxlength="100" autocomplete="new-password" placeholder="••••••••" />
        </div>
        <div class="actions">
          <button type="submit" id="register-btn">Criar conta</button>
        </div>
      </form>

      <p class="auth-footer">
        Já tem conta? <a href="login.html">Faça login</a>
      </p>
    </div>
  </main>

  <footer class="auth-footer-page">
    Feito por Camile · Guilherme · Maria Fernanda · Raul — Univille
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/auth-page.js"></script>
</body>
</html>
